# Security headers — included by both vhosts (templates/default.conf.template).
# `always` = also on error responses.
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# Enable in production once HTTPS is confirmed working everywhere (2 years):
# add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

# CSP starter — tighten per project, then uncomment. Vite dev server and
# Inertia need script/style allowances; test with the browser suite first.
# add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'" always;
