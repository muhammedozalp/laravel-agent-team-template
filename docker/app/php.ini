; Dev PHP overrides (baked into the app image).
memory_limit = 512M
upload_max_filesize = 32M
post_max_size = 40M
max_execution_time = 120

opcache.enable = 1
opcache.validate_timestamps = 1   ; dev: pick up code changes immediately
opcache.memory_consumption = 192

; Errors loud in dev; APP_DEBUG handles presentation.
display_errors = On
error_reporting = E_ALL
